clusterID: {{ .ClusterName }}
apps:
  gatewayApiCrds:
    enabled: true
  envoyGateway:
    enabled: true
  gatewayApiConfig:
    enabled: true
    userConfig:
      configMap:
        values:
          gateways:
            default:
              dnsName: ingress
              service:
                annotations:
                  service.beta.kubernetes.io/aws-load-balancer-scheme: "internal"
              listeners:
                http:
                  httpsRedirectEnabled: true
                  allowedRoutes:
                    namespaces:
                      from: Same
                https:
                  dnsEndpoints:
                    enabled: false
                  certificate:
                    enabled: true
                    wildcard: true
                    issuer:
                      kind: ClusterIssuer
                      name: letsencrypt-giantswarm
